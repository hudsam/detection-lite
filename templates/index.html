<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Lite – Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" >
    <style>
        body { background-color: #f8f9fa; }
        .card-custom { max-width: 450px; margin-top: 10%; border-radius: 15px; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center">
    <div class="card card-custom shadow-sm w-100 p-4">
        <div class="card-body">
            <h3 class="card-title text-center mb-4 fw-bold text-primary">Welcome</h3>
            <p class="text-muted text-center small mb-4">Please enter your name to view device information.</p>
            
            <form action="/" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold"><i class="bi bi-person-vcard"></i> Name</label>
                    <input type="text" class="form-control form-control-md" id="name" name="name" placeholder="hudsam" required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-outline-primary btn-md w-100 shadow-sm mt-2"><i class="bi bi-search"></i> Check Device Data</button>
            </form>
        </div>
    </div>
</div>
<footer class="fixed-bottom bg-white border-top py-3 text-center text-muted small shadow-sm">
    <div class="container">
        <span><i class="bi bi-github"></i> <a class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" href="https://github.com/hudsam">github.com/hudsam</a></span>
    </div>
</footer>
</body>
</html>
