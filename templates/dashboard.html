<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detection Lite – Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet" >
    <style>
        body { background-color: #f8f9fa; }
        .dashboard-card { max-width: 600px; margin: 5% auto; border-radius: 15px; }
    </style>
</head>
<body>
<div class="container text-center">
    <div class="card dashboard-card shadow p-4 text-start">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="mb-0 text-dark">Hi, <span class="text-primary fw-bold">{{ name }}</span>!</h4>
                <span class="badge bg-success p-2">Active Session</span>
            </div>
            <h5 class="text-muted mb-3 fw-semibold">Your Device Information:</h5>
            
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <tbody>
                        <tr>
                            <td class="text-muted fw-medium" style="width: 40%;">Local IP</td>
                            <td class="fw-bold text-secondary">{{ local_ip }}</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-medium">Public IP</td>
                            <td class="fw-bold text-secondary">{{ public_ip }}</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-medium">OS</td>
                            <td class="fw-bold text-secondary">{{ os }}</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-medium">Date</td>
                            <td class="fw-bold text-secondary">{{ date }}</td>
                        </tr>
                        <tr>
                            <td class="text-muted fw-medium">Time</td>
                            <td class="fw-bold text-secondary">{{ time }}</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="mt-4 text-center">
                <a href="{{ url_for('index') }}" class="btn btn-outline-danger px-4 py-2 shadow-sm fw-semibold">
                    <i class="bi bi-door-closed"></i> Log out
                </a>
            </div>
        </div>
    </div>
</div>
<footer class="fixed-bottom bg-white border-top py-3 text-center text-muted small shadow-sm">
    <div class="container">
        <span><i class="bi bi-github"></i> <a class="link-secondary link-offset-2 link-underline-opacity-25 link-underline-opacity-100-hover" href="https://github.com/hudsam">github.com/hudsam</a></span>
    </div>
</footer>
</body>
</html>
